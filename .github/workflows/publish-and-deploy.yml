name: Deploy Worker on version bump

on:
  push:
    branches: [main]
    paths:
      - "package.json"

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if npm version changed
        id: version
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view @smsmasivos/mcp-server version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL remote=$REMOTE"
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Worker deploy
        if: steps.version.outputs.changed == 'true'
        run: |
          gh workflow run deploy.yml --repo SMS-Masivos/mcp-worker --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
